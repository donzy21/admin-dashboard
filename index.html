<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Global Sports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="login-section" class="auth-container">
      <div class="auth-card">
        <h1>Admin Login</h1>
        <form id="login-form">
          <input type="text" id="username" placeholder="Username" required>
          <input type="password" id="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error"></p>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="dashboard" style="display: none;">
      <div class="header">
        <h1>Global Sports Admin Dashboard</h1>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </div>

      <div class="stats-container">
        <div class="stat-card">
          <h3>Total Orders</h3>
          <p class="stat-value" id="total-orders">-</p>
        </div>
        <div class="stat-card">
          <h3>Total Products</h3>
          <p class="stat-value" id="total-products">-</p>
        </div>
        <div class="stat-card">
          <h3>Total Riders</h3>
          <p class="stat-value" id="total-riders">-</p>
        </div>
        <div class="stat-card">
          <h3>Pending Riders</h3>
          <p class="stat-value" id="pending-riders">-</p>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <p class="stat-value" id="total-revenue">-</p>
        </div>
      </div>

      <div class="action-buttons">
        <button id="manage-products-btn" class="action-btn">Manage Products</button>
        <button id="manage-riders-btn" class="action-btn">Manage Riders</button>
        <button id="manage-orders-btn" class="action-btn">View Orders</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
